<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Login to MiniConnect - Connect with friends and share your world">
    <title>Login | MiniConnect</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <main class="auth-page">
        <!-- Decorative animated orbs -->
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>

        <div class="auth-container">
            <div class="auth-card">
                <!-- Header -->
                <div class="auth-header">
                    <div class="logo">
                        <span class="logo-icon">✦</span>
                        MiniConnect
                    </div>
                    <h1>Welcome Back</h1>
                    <p>Sign in to continue to your account</p>
                </div>

                <!-- Alert message area -->
                <div id="alert-container"></div>

                <!-- Login Form -->
                <form id="login-form" novalidate>
                    <!-- Email Field -->
                    <div class="form-group">
                        <label for="login-email">Email Address</label>
                        <div class="input-wrapper">
                            <input
                                type="email"
                                id="login-email"
                                class="form-input"
                                placeholder="Enter your email"
                                required
                                autocomplete="email"
                            >
                            <span class="input-icon">✉</span>
                        </div>
                    </div>

                    <!-- Password Field -->
                    <div class="form-group">
                        <label for="login-password">Password</label>
                        <div class="input-wrapper">
                            <input
                                type="password"
                                id="login-password"
                                class="form-input"
                                placeholder="Enter your password"
                                required
                                autocomplete="current-password"
                            >
                            <span class="input-icon">🔒</span>
                            <button type="button" class="password-toggle" id="toggle-password" aria-label="Toggle password visibility">👁</button>
                        </div>
                    </div>

                    <!-- Submit Button -->
                    <button type="submit" id="login-btn" class="btn btn-primary">
                        <span id="login-btn-text">Sign In</span>
                    </button>
                </form>

                <!-- Divider -->
                <div class="divider">or</div>

                <!-- Footer -->
                <div class="auth-footer">
                    Don't have an account? <a href="register.html">Create one</a>
                </div>
            </div>
        </div>
    </main>

    <!-- Toast Container -->
    <div id="toast-container" class="toast-container"></div>

    <script src="js/auth.js"></script>
</body>
</html>
