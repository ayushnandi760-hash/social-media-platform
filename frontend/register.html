<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Create your MiniConnect account - Join the community today">
    <title>Register | MiniConnect</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <main class="auth-page">
        <!-- Decorative animated orbs -->
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>

        <div class="auth-container">
            <div class="auth-card">
                <!-- Header -->
                <div class="auth-header">
                    <div class="logo">
                        <span class="logo-icon">✦</span>
                        MiniConnect
                    </div>
                    <h1>Create Account</h1>
                    <p>Join MiniConnect and start connecting</p>
                </div>

                <!-- Alert message area -->
                <div id="alert-container"></div>

                <!-- Register Form -->
                <form id="register-form" novalidate>
                    <!-- Name Field -->
                    <div class="form-group">
                        <label for="register-name">Full Name</label>
                        <div class="input-wrapper">
                            <input
                                type="text"
                                id="register-name"
                                class="form-input"
                                placeholder="Enter your full name"
                                required
                                autocomplete="name"
                            >
                            <span class="input-icon">👤</span>
                        </div>
                    </div>

                    <!-- Email Field -->
                    <div class="form-group">
                        <label for="register-email">Email Address</label>
                        <div class="input-wrapper">
                            <input
                                type="email"
                                id="register-email"
                                class="form-input"
                                placeholder="Enter your email"
                                required
                                autocomplete="email"
                            >
                            <span class="input-icon">✉</span>
                        </div>
                    </div>

                    <!-- Password Field -->
                    <div class="form-group">
                        <label for="register-password">Password</label>
                        <div class="input-wrapper">
                            <input
                                type="password"
                                id="register-password"
                                class="form-input"
                                placeholder="Create a password (min 6 characters)"
                                required
                                minlength="6"
                                autocomplete="new-password"
                            >
                            <span class="input-icon">🔒</span>
                            <button type="button" class="password-toggle" id="toggle-password" aria-label="Toggle password visibility">👁</button>
                        </div>
                    </div>

                    <!-- Confirm Password Field -->
                    <div class="form-group">
                        <label for="register-confirm-password">Confirm Password</label>
                        <div class="input-wrapper">
                            <input
                                type="password"
                                id="register-confirm-password"
                                class="form-input"
                                placeholder="Confirm your password"
                                required
                                autocomplete="new-password"
                            >
                            <span class="input-icon">🔒</span>
                        </div>
                    </div>

                    <!-- Submit Button -->
                    <button type="submit" id="register-btn" class="btn btn-primary">
                        <span id="register-btn-text">Create Account</span>
                    </button>
                </form>

                <!-- Divider -->
                <div class="divider">or</div>

                <!-- Footer -->
                <div class="auth-footer">
                    Already have an account? <a href="index.html">Sign in</a>
                </div>
            </div>
        </div>
    </main>

    <!-- Toast Container -->
    <div id="toast-container" class="toast-container"></div>

    <script src="js/auth.js"></script>
</body>
</html>
